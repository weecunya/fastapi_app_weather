<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Поиск погоды</title>
    <style>
        body { font-family: Arial; background: #1e3c72; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { max-width: 450px; background: white; border-radius: 28px; padding: 30px; text-align: center; }
        h1 { color: #1e3c72; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 50px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #2a5298; color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 16px; }
        .btn-back { background: #6c757d; margin-top: 10px; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="card">
    <h1>🌤️ Поиск погоды</h1>
    <input type="text" id="city" placeholder="Введите город">
    <button onclick="let c=document.getElementById('city').value.trim(); if(c) location.href='/weather-result.html?city='+encodeURIComponent(c)">Найти</button>
    <button class="btn-back" onclick="location.href='/profile.html'">← Назад</button>
</div>
</body>
</html>
