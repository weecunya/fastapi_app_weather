<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Удалить аккаунт</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; }
        button { padding: 10px; margin: 10px; cursor: pointer; }
        .danger { background: red; color: white; }
    </style>
</head>
<body>

<h1>Удаление аккаунта</h1>
<p>Вы уверены? Это действие необратимо.</p>

<button id="confirmDelete" class="danger">Да, удалить</button>
<button id="cancelBtn">Отмена</button>

<script>
    document.getElementById('confirmDelete').onclick = async () => {
        const res = await fetch('/users/delete', { method: 'DELETE', credentials: 'include' });
        if (res.ok) {
            alert('Аккаунт удалён');
            window.location.href = '/';
        } else {
            alert('Ошибка удаления');
        }
    };
    document.getElementById('cancelBtn').onclick = () => window.location.href = '/profile.html';
</script>

</body>
</html>
