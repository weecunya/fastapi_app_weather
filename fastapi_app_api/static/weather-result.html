<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Отладка</title>
    <style>
        body { font-family: Arial; background: #1e3c72; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { max-width: 600px; background: white; border-radius: 28px; padding: 25px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 12px; overflow-x: auto; font-size: 13px; }
        .error { color: #dc3545; }
        .btn { display: block; width: 100%; margin-top: 12px; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>Результат поиска погоды</h2>
    <div id="info"></div>
    <pre id="raw"></pre>
    <button class="btn" onclick="location.href='/weather.html'">← Назад</button>
</div>
<script>
    (function() {
        const city = new URLSearchParams(location.search).get('city');
        const info = document.getElementById('info');
        const rawDiv = document.getElementById('raw');

        if (!city) {
            info.innerHTML = '<div class="error">❌ Город не указан в URL</div>';
            rawDiv.innerHTML = 'URL: ' + location.href;
            return;
        }

        info.innerHTML = '🔍 Ищу погоду для: <b>' + city + '</b><br>Запрос: /weather/city?city_name=' + encodeURIComponent(city);

        fetch('/weather/city?city_name=' + encodeURIComponent(city), { credentials: 'include' })
            .then(res => {
                rawDiv.innerHTML = 'Статус ответа: ' + res.status + ' ' + res.statusText + '\n\n';
                return res.text();
            })
            .then(text => {
                rawDiv.innerHTML += 'ОТВЕТ СЕРВЕРА (сырой текст):\n' + text;
                try {
                    const json = JSON.parse(text);
                    rawDiv.innerHTML += '\n\n✅ Это валидный JSON\n';
                    rawDiv.innerHTML += 'Структура: ' + JSON.stringify(json, null, 2);
                    info.innerHTML += '<br>✅ Данные получены!';
                } catch(e) {
                    rawDiv.innerHTML += '\n\n❌ НЕ JSON! Ошибка: ' + e.message;
                }
            })
            .catch(err => {
                rawDiv.innerHTML += '\n\n❌ Ошибка запроса: ' + err.message;
            });
    })();
</script>
</body>
</html>
