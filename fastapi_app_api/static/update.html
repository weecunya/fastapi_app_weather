<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Редактировать профиль</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 8px; margin: 8px 0; }
        button { padding: 10px; margin-top: 10px; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>

<h1>Редактировать профиль</h1>

<input type="text" id="first_name" placeholder="Имя">
<input type="text" id="last_name" placeholder="Фамилия">
<button id="saveBtn">Сохранить</button>
<button id="backBtn">Назад</button>
<div id="error" class="error"></div>

<script>
    async function loadData() {
        const res = await fetch('/users/me', { credentials: 'include' });
        if (res.ok) {
            const user = await res.json();
            document.getElementById('first_name').value = user.first_name;
            document.getElementById('last_name').value = user.last_name;
        } else {
            window.location.href = '/';
        }
    }

    document.getElementById('saveBtn').onclick = async () => {
        const first_name = document.getElementById('first_name').value;
        const last_name = document.getElementById('last_name').value;
        const res = await fetch('/users/update', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ first_name, last_name }),
            credentials: 'include'
        });
        if (res.ok) {
            window.location.href = '/profile.html';
        } else {
            const err = await res.json();
            document.getElementById('error').innerText = err.detail || 'Ошибка';
        }
    };
    document.getElementById('backBtn').onclick = () => window.location.href = '/profile.html';

    loadData();
</script>

</body>
</html>
