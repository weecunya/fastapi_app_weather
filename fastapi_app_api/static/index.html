<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; background: #d4eaff;}
        input { width: 100%; padding: 8px; margin: 8px 0; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .tab { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab button { width: 50%; background: #e0e0e0; }
        .tab .active { background: #007bff; color: white; }
        .form { display: none; }
        .form.active { display: block; }
    </style>
</head>
<body>

<div class="tab">
    <button id="loginTab" class="active">Вход</button>
    <button id="registerTab">Регистрация</button>
</div>

<div id="loginForm" class="form active">
    <h2>Вход</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Пароль">
    <button id="loginBtn">Войти</button>
    <div id="loginError" class="error"></div>
</div>

<div id="registerForm" class="form">
    <h2>Регистрация</h2>
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Пароль">
    <input type="password" id="regPassword2" placeholder="Повторите пароль">
    <input type="text" id="regFirstName" placeholder="Имя">
    <input type="text" id="regLastName" placeholder="Фамилия">
    <button id="registerBtn">Зарегистрироваться</button>
    <div id="registerError" class="error"></div>
    <div id="registerSuccess" class="success"></div>
</div>

<script>
    document.getElementById('loginTab').onclick = () => {
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('registerTab').classList.remove('active');
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
    };
    document.getElementById('registerTab').onclick = () => {
        document.getElementById('registerTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
    };

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
            credentials: 'include'
        });
        if (res.ok) {
            window.location.href = '/profile.html';
        } else {
            const err = await res.json();
            document.getElementById('loginError').innerText = err.detail || 'Ошибка входа';
        }
    };

    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const password2 = document.getElementById('regPassword2').value;
        const first_name = document.getElementById('regFirstName').value;
        const last_name = document.getElementById('regLastName').value;
        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, password2, first_name, last_name })
        });
        if (res.ok) {
            document.getElementById('registerSuccess').innerText = 'Регистрация успешна! Теперь войдите.';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPassword2').value = '';
            document.getElementById('regFirstName').value = '';
            document.getElementById('regLastName').value = '';
            setTimeout(() => document.getElementById('loginTab').click(), 1500);
        } else {
            const err = await res.json();
            document.getElementById('registerError').innerText = err.detail || 'Ошибка регистрации';
        }
    };
</script>

</body>
</html>
