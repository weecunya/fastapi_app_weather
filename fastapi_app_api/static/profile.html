<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px;  background: #d4eaff;}
        button { padding: 10px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>

<h1>Профиль</h1>

<div class="info">
    <p><strong>Email:</strong> <span id="email">-</span></p>
    <p><strong>Имя:</strong> <span id="first_name">-</span></p>
    <p><strong>Фамилия:</strong> <span id="last_name">-</span></p>
</div>

<button id="refreshBtn">Обновить</button>
<button id="editBtn">Редактировать</button>
<button id="deleteBtn">Удалить аккаунт</button>
<button id="logoutBtn">Выйти</button>
<button id="weatherBtn">Погода</button>

<script>
    async function loadProfile() {
        const res = await fetch('/users/me', { credentials: 'include' });
        if (res.ok) {
            const user = await res.json();
            document.getElementById('email').innerText = user.email;
            document.getElementById('first_name').innerText = user.first_name;
            document.getElementById('last_name').innerText = user.last_name;
        } else {
            window.location.href = '/';
        }
    }

    document.getElementById('refreshBtn').onclick = loadProfile;
    document.getElementById('editBtn').onclick = () => window.location.href = '/update.html';
    document.getElementById('deleteBtn').onclick = () => window.location.href = '/delete.html';
    document.getElementById('logoutBtn').onclick = () => window.location.href = '/logout.html';
    document.getElementById('weatherBtn').onclick = () => window.location.href = '/weather.html';

    loadProfile();
</script>

</body>
</html>
