version: '3.8'

services:
  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: sqlite+aiosqlite:///./fastapi_auth.db
    env_file:
      - .env
    networks:
      - app_network
    volumes:
      - ./fastapi_auth.db:/app/fastapi_auth.db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    ports:
      - "6379:6379"
    networks:
      - app_network
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge